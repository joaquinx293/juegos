<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <title>Juegos</title>
</head>

<body>
  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="#">Juegos</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto gap-1">
          <li class="nav-item"><a class="nav-link" href="#juego1">contador</a></li>
          <li class="nav-item"><a class="nav-link" href="#juego2">adivina</a></li>
          <li class="nav-item"><a class="nav-link" href="#juego3">ppt</a></li>
          <li class="nav-item"><a class="nav-link" href="#juego4">reacción</a></li>
          <li class="nav-item"><a class="nav-link" href="#juego5">trivia</a></li>
          <li class="nav-item"><a class="nav-link" href="#juego6">reflejos</a></li>
          <li class="nav-item"><a class="nav-link" href="#juego7">preguntas</a></li>
          <li class="nav-item"><a class="nav-link" href="#juego8">tic tac toe</a></li>
          <li class="nav-item"><a class="nav-link" href="#juego9">snake</a></li>
          <li class="nav-item"><a class="nav-link" href="#juego10">whack-a-mole</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <div class="container">
    <section id="juego1" class="game-section">
      <h2 class="game-title">Juego 1 Contador Interactivo</h2>
      <div class="card p-4 text-center">
        <h1 id="contador-valor" class="display-1 fw-bold">0</h1>
        <div class="d-flex justify-content-center gap-3 mt-3">
          <button class="btn btn-danger btn-lg" onclick="restar()">− Restar</button>
          <button class="btn btn-secondary btn-lg" onclick="resetContador()">Reset</button>
          <button class="btn btn-success btn-lg" onclick="sumar()">+ Sumar</button>
        </div>
      </div>
    </section>
     <section id="juego2" class="game-section">
      <h2 class="game-title">Juego 2 Adivina el Numero</h2>
      <div class="card p-4">
        <p class="text-muted">Adivina un número entre 1 y 100</p>
        <div class="d-flex gap-2 mb-3">
          <input type="number" id="adivina-input" class="form-control" placeholder="Tu número..." min="1" max="100">
          <button class="btn btn-primary" onclick="adivinar()">Adivinar</button>
        </div>
        <p id="adivina-mensaje" class="fw-bold"></p>
        <p id="adivina-intentos" class="text-muted">Intentos restantes: <span id="intentos-restantes">5</span></p>
        <button class="btn btn-outline-secondary btn-sm" onclick="reiniciarAdivina()">Nuevo juego</button>
      </div>
    </section id-="juego3"class="game-section">
    <h2 class="game-title"> Juego 3 priedra papel y tijeras
    </h2>
    
    <section>

    </section>
  </div>
  

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
